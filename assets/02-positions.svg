<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 600" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <style>
      .bg{fill:#0d1117}
      .title{fill:#e6edf3;font-size:22px;font-weight:700}
      .sub{fill:#8b949e;font-size:13px}
      .ax{stroke:#30363d;stroke-width:1.5}
      .axt{fill:#8b949e;font-size:12.5px}
      .peg{stroke:#e6edf3;stroke-width:1.3;stroke-dasharray:5 5;opacity:.55}
      .out{fill:none;stroke:#e6edf3;stroke-width:1.5;opacity:.5}
      .lt{fill:#e6edf3;font-size:13px;font-weight:600}
      .ls{fill:#8b949e;font-size:12px}
      .note{fill:#c9d4e3;font-size:12.5px}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="600"/>
  <text class="title" x="40" y="46">Four positions stack into one depth curve</text>
  <text class="sub" x="40" y="70">A fixed full-range backstop plus three nested bands the hook reports — capital concentrates where trades happen</text>

  <!-- stacked bands (centered on peg at x=510, baseline y=480) -->
  <!-- P0 backstop: full width, thin -->
  <rect x="120" y="458" width="780" height="22" fill="#475569" opacity="0.85"/>
  <!-- P3 99.9% -->
  <rect x="180" y="418" width="660" height="40" fill="#0e7490" opacity="0.88"/>
  <!-- P2 99% -->
  <rect x="270" y="348" width="480" height="70" fill="#2563eb" opacity="0.88"/>
  <!-- P1 90% (most capital) -->
  <rect x="400" y="198" width="220" height="150" fill="#22c55e" opacity="0.9"/>

  <!-- silhouette outline -->
  <polyline class="out" points="120,458 180,458 180,418 270,418 270,348 400,348 400,198 620,198 620,348 750,348 750,418 840,418 840,458 900,458"/>

  <!-- peg line -->
  <line class="peg" x1="510" y1="150" x2="510" y2="480"/>
  <text class="axt" x="510" y="145" text-anchor="middle" fill="#e6edf3">peg · 1.00</text>

  <!-- x axis -->
  <line class="ax" x1="120" y1="480" x2="900" y2="480"/>
  <text class="axt" x="200" y="500" text-anchor="middle">0.95</text>
  <text class="axt" x="510" y="500" text-anchor="middle">1.00</text>
  <text class="axt" x="820" y="500" text-anchor="middle">1.05</text>
  <text class="axt" x="510" y="522" text-anchor="middle">USDC price of USDT  (hook capture window ≈ ±5%)</text>

  <!-- y axis label -->
  <text class="axt" x="104" y="320" text-anchor="middle" transform="rotate(-90 104 320)">liquidity depth</text>

  <!-- legend -->
  <rect x="650" y="150" width="22" height="14" fill="#22c55e"/>
  <text class="lt" x="680" y="162">P1 · 90% band</text><text class="ls" x="800" y="162">≈ 79% of capital</text>
  <rect x="650" y="174" width="22" height="14" fill="#2563eb"/>
  <text class="lt" x="680" y="186">P2 · 99% band</text><text class="ls" x="800" y="186">≈ 15%</text>
  <rect x="650" y="198" width="22" height="14" fill="#0e7490"/>
  <text class="lt" x="680" y="210">P3 · 99.9% band</text><text class="ls" x="800" y="210">≈ 5%</text>
  <rect x="650" y="222" width="22" height="14" fill="#475569"/>
  <text class="lt" x="680" y="234">P0 · full-range</text><text class="ls" x="800" y="234">≈ 1% (never moved)</text>

  <text class="note" x="40" y="566">Bands 1–3 come from one hook call — computeRanges([9000, 9900, 9990]) — and shift to follow the market on every rebalance.</text>
</svg>
