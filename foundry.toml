[profile.default]
src = "src"
out = "out"
libs = ["lib"]

solc_version = "0.8.26"
evm_version = "cancun"
ffi = true
optimizer = true
optimizer_runs = 200
# via-IR required: keeps USDaVault runtime bytecode under the EIP-170 24,576-byte limit
# (~23.9KB with via-IR vs ~25.8KB without). See ARCHITECTURE §11.
via_ir = true

[profile.default.fuzz]
runs = 256

[rpc_endpoints]
mainnet = "${ETH_RPC_URL}"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
