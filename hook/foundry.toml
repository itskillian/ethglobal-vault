[profile.default]
src = "src"
out = "out"
libs = ["lib"]

solc_version = "0.8.26"
evm_version = "cancun"
ffi = true

# v4-core's PoolManager only fits under EIP-170 (24,576 B) with the optimizer enabled — the
# settings it is designed to ship with. Without it, `forge build --sizes` (a CI gate) fails.
# via-ir is left off: v4 compiles its own test harness with via_ir=false, and turning it on here
# trips a Yul stack-too-deep in the swap path.
optimizer = true
optimizer_runs = 200

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

# Named RPC endpoints for `forge script --rpc-url <name>`. Values come from .env (see .env.example).
[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
mainnet = "${MAINNET_RPC_URL}"

# Source verification on deploy (`--verify`). Etherscan v2 uses a single multichain key.
[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11155111 }
mainnet = { key = "${ETHERSCAN_API_KEY}", chain = 1 }
